<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark OS Background -->
  <rect width="512" height="512" rx="128" fill="#050816" />
  
  <!-- Glowing Cyan Accent Behind the P -->
  <circle cx="256" cy="256" r="140" fill="#22D3EE" opacity="0.2" filter="blur(20px)" />
  
  <!-- The Letter P -->
  <text x="45%" y="55%" font-family="Arial, sans-serif" font-weight="900" font-size="320" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">P</text>
  
  <!-- The Cyan OS Dot -->
  <circle cx="410" cy="380" r="45" fill="#22D3EE" />
</svg>
